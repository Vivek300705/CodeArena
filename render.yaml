# ─────────────────────────────────────────────────────────────
# CodeArena Render Blueprint (FIXED)
# ─────────────────────────────────────────────────────────────

services:
  # ── API Web Service ─────────────────────────────────────────
  - type: web
    name: codearena-api
    runtime: node
    plan: free
    region: ohio
    rootDir: server

    buildCommand: npm ci --omit=dev
    startCommand: node src/main.js

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # ⚠️ IMPORTANT: optional, Render auto-injects PORT
      - key: PORT
        value: 10000

      # 🔐 Set these manually in Render dashboard
      - key: MONGODB_URI
        sync: false

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: LOG_LEVEL
        value: info
      - key: REDIS_TLS
        value: "false"   # because your REDIS_URL is redis://...

  # ── Submission Worker ───────────────────────────────────────
  - type: worker
    name: codearena-worker
    runtime: docker
    plan: free
    region: ohio
    rootDir: server

    dockerfilePath: Dockerfile.worker
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # ⚠️ DO NOT try Docker-in-Docker on Render
      - key: USE_DOCKER
        value: "false"

      - key: MONGODB_URI
        sync: false

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET
        fromService:
          type: web
          name: codearena-api
          envVarKey: JWT_SECRET
      - key: REDIS_TLS
        value: "false"