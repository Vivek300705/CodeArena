# ──────────────────────────────────────────────────────────────────────────────
# CodeArena Render Blueprint (render.yaml)
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── API Web Service ──────────────────────────────────────────────────────────
  - type: web
    name: codearena-api
    runtime: node
    plan: starter
    region: ohio # Best match for your us-east-1 Redis
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node src/main.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false # Set manually using your Redis Cloud URL
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
    ipAllowList:
      - cidr: 0.0.0.0/0
        description: Required for database connectivity

  # ── Submission Worker (Background Worker) ────────────────────────────────────
  - type: worker
    name: codearena-worker
    runtime: docker # Changed to Docker to support compilers
    plan: starter
    region: ohio
    rootDir: server
    dockerfilePath: Dockerfile.worker # Ensure this file exists in your /server folder
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_DOCKER
        value: "false" # Uses the local compilers in the Ubuntu image
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: codearena-api
          envVarKey: JWT_SECRET
    ipAllowList:
      - cidr: 0.0.0.0/0
        description: Required for database connectivity

# Note: Removed the 'type: redis' block because you are using Redis Cloud.
# This saves you the monthly cost of a second Redis instance on Render.