# ──────────────────────────────────────────────────────────────────────────────
#  Nginx — CodeArena API upstream + server block
#
#  Horizontal scaling:
#    docker compose up --scale api=3
#  Nginx round-robins across all healthy api containers automatically
#  because Docker's embedded DNS resolves "api" to all container IPs.
# ──────────────────────────────────────────────────────────────────────────────

upstream codearena_api {
    # Docker DNS resolves "api" to all running api container IPs.
    # least_conn ensures even distribution when response times vary.
    least_conn;
    server api:8000;

    keepalive 32;   # persistent connections to upstream for lower latency
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;    # reject payloads > 2 MB at Nginx level

    # Apply coarse rate limiting (defined in nginx.conf)
    limit_req zone=api_zone burst=20 nodelay;
    limit_req_status 429;

    # ── Health check passthrough (no rate limit on /health) ───────────────────
    location = /health {
        limit_req off;
        proxy_pass http://codearena_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── API & Auth routes ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://codearena_api;
        proxy_http_version 1.1;

        # Keep-alive to upstream
        proxy_set_header Connection "";

        # Forward real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffer tuning
        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 16k;
    }

    # ── WebSocket upgrade (Socket.io) ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://codearena_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # long-lived WS connections
    }
}
